<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a0f;
      --panel: #0d1117;
      --border: rgba(255,255,255,0.07);
      --accent: #4fffb0;
      --accent2: #00c8ff;
      --text: #e8eaf0;
      --muted: #5a6070;
      --error: #ff4f6a;
      --glow: 0 0 30px rgba(79,255,176,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridShift 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* Noise overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    /* Glowing orb top-left */
    .orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,255,176,0.06) 0%, transparent 70%);
      top: -150px;
      left: -150px;
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    .orb2 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,255,0.05) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite alternate-reverse;
    }
    @keyframes pulse {
      from { opacity: 0.6; transform: scale(1); }
      to { opacity: 1; transform: scale(1.1); }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 420px;
      padding: 48px 40px;
      position: relative;
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
      transform: translateY(24px);
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .card::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .logo-icon::after {
      content: '';
      width: 12px;
      height: 12px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.08em;
      color: var(--text);
    }
    .logo-text span { color: var(--accent); }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      border-radius: 2px;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,255,176,0.08);
      background: rgba(79,255,176,0.03);
    }
    input::placeholder { color: var(--muted); }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.05em;
      font-family: 'Space Mono', monospace;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--accent); }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      margin-top: -4px;
    }
    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .check-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      padding: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .forgot {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--accent); }

    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.3s, box-shadow 0.3s;
      border-radius: 2px;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: var(--bg); box-shadow: var(--glow); }
    .btn span { position: relative; z-index: 1; }
    .btn:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .register-row {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }
    .register-row a {
      color: var(--accent2);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .register-row a:hover { opacity: 0.7; }

    .status-bar {
      margin-top: 20px;
      padding: 10px 12px;
      border-radius: 2px;
      font-size: 11px;
      letter-spacing: 0.05em;
      display: none;
    }
    .status-bar.error {
      display: block;
      background: rgba(255,79,106,0.08);
      border: 1px solid rgba(255,79,106,0.25);
      color: var(--error);
    }
    .status-bar.success {
      display: block;
      background: rgba(79,255,176,0.08);
      border: 1px solid rgba(79,255,176,0.25);
      color: var(--accent);
    }

    /* Scanline flicker */
    @keyframes scanline {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.05) 3px,
        rgba(0,0,0,0.05) 4px
      );
    }
  </style>
</head>
<body>
  <div class="orb"></div>
  <div class="orb2"></div>
  <div class="scanlines"></div>

  <div class="container">
    <div class="card">
      <div class="logo-row">
        <div class="logo-icon"></div>
        <div class="logo-text">NEXUS<span>_</span>AUTH</div>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Authenticate to continue</p>

      <form method="POST" action="/login" id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input type="text" id="username" name="username" placeholder="enter username" autocomplete="username" />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" id="togglePw">SHOW</button>
          </div>
        </div>

        <div class="meta-row">
          <label class="check-label">
            <input type="checkbox" name="remember" /> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn">
          <span>Authenticate &rarr;</span>
        </button>
      </form>

      <div class="status-bar" id="statusBar"></div>

      <div class="divider"><span>or</span></div>
      <div class="register-row">
        Don't have an account? <a href="#">Request access</a>
      </div>
    </div>
  </div>

  <script>
    // Toggle password visibility
    const togglePw = document.getElementById('togglePw');
    const pwInput = document.getElementById('password');
    togglePw.addEventListener('click', () => {
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        togglePw.textContent = 'HIDE';
      } else {
        pwInput.type = 'password';
        togglePw.textContent = 'SHOW';
      }
    });

    // Form submission (demo - shows status, doesn't actually submit)
    const form = document.getElementById('loginForm');
    const statusBar = document.getElementById('statusBar');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      if (!user || !pass) {
        statusBar.className = 'status-bar error';
        statusBar.textContent = '⚠ Both fields are required.';
        return;
      }

      // Demo: accept admin/password123 for local testing
      if (user === 'admin' && pass === 'password123') {
        statusBar.className = 'status-bar success';
        statusBar.textContent = '✓ Authentication successful. Redirecting...';
      } else {
        statusBar.className = 'status-bar error';
        statusBar.textContent = '✗ Invalid credentials. Access denied.';
      }
    });
  </script>
</body>
</html>
